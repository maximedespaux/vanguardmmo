<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vanguard · AirBuilder</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/airbuilder/airbuilder.css">
<style>html,body{margin:0;background:#0e0e12;color:#e8e8ee}.abx{padding:10px 12px}</style>
</head><body>
<div class="abx"><div class="wrap">
  <div class="topbar"><div class="brand">Air<span>Builder</span></div><div class="step">Configure ton stuff, puis clique « Valider »</div>
    <div class="ptabs" id="ptabs" style="margin-left:auto"></div></div>
  <div class="setup" id="setup"></div>
  <div class="stuffbar" id="stuffbar"></div>

  <div class="doll">
    <div class="dollttl" id="dollttl">Équipement</div>
    <div class="rowT" id="rowT"></div>
    <div class="colL" id="colL"></div>
    <div class="center"><div class="silwrap"><div class="silhead"><div class="cn" id="cn"></div><div class="cc" id="cc"></div></div><img class="charimg" id="charimg" alt=""></div></div>
    <div class="colR" id="colR"></div>
    <div class="rowB" id="rowB"></div>
    <div class="petbar" id="petbar"></div>
  </div>
  <div class="legend">Haut = bijoux · Gauche = arme, bouclier, mantra, cape, masque · Droite = équipement · Bas = fashion (tête, haut, gants, bottes) · Barre séparée = ramasseur &amp; familier.</div>

  <div class="note" id="famnote" style="display:none"></div>
  <div class="stats" id="stats"></div>
  <div class="panel" id="carnetsPanel"></div>
  <div class="actions"><button class="btn ghost" onclick="resetChar()">↺ Vider ce perso</button><button class="btn" onclick="exportBuild()">✅ Valider ce build</button></div>
</div>
<div id="modalRoot"></div></div>
<script>
window.__embed = 1;
fetch('/airbuilder/data.json').then(function (r) { return r.text(); }).then(function (txt) {
  if (!document.getElementById('DATA')) { var d = document.createElement('script'); d.id = 'DATA'; d.type = 'application/json'; d.textContent = txt; document.body.appendChild(d); }
  var s = document.createElement('script'); s.src = '/airbuilder/airbuilder.js'; document.body.appendChild(s);
});
</script>
</body></html>
