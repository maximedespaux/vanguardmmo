<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanguard — Chambres & Donjons</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --orange:#FF8C1A; --orange-dark:#CC6E00; --orange-glow:rgba(255,140,26,0.3);
    --bg:#0A0A0C; --bg-2:#131318; --bg-3:#1C1C24; --bg-4:#26262F; --border:#2E2E38;
    --text:#E8E8EC; --text-muted:#8A8A95; --green:#4ADE80; --red:#F87171; --gold:#FFD24A; --blue:#4EA8FF; --purple:#C77DFF; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh;
    background-image:radial-gradient(circle at 15% 10%, rgba(255,140,26,0.05), transparent 35%), radial-gradient(circle at 85% 90%, rgba(255,140,26,0.04), transparent 35%); }
  h1,h2,h3,h4 { font-family:'Rajdhani',sans-serif; }
  .container { max-width:1200px; margin:0 auto; padding:24px; }
  .header { display:flex; align-items:center; gap:16px; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .logo-circle { width:50px; height:50px; border-radius:12px; background:var(--bg-3); border:1px solid var(--orange); display:flex; align-items:center; justify-content:center; box-shadow:0 0 18px var(--orange-glow); }
  .logo-circle span { font-family:'Rajdhani'; font-weight:700; color:var(--orange); font-size:26px; }
  .header h1 { font-size:28px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
  .header .sub { color:var(--text-muted); font-size:12px; font-family:monospace; letter-spacing:2px; text-transform:uppercase; }
  .filters { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .filter { padding:8px 16px; background:var(--bg-3); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-family:'Rajdhani'; font-weight:600; font-size:13px; text-transform:uppercase; letter-spacing:1px; }
  .filter.active { border-color:var(--orange); color:var(--orange); background:rgba(255,140,26,0.1); }
  .search-bar { width:100%; background:var(--bg-3); border:1px solid var(--border); border-radius:8px; padding:11px 16px; color:var(--text); font-size:14px; margin-bottom:20px; }
  .search-bar:focus { outline:none; border-color:var(--orange); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:16px; }
  .dungeon { background:var(--bg-2); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:all 0.15s; }
  .dungeon:hover { border-color:var(--orange); box-shadow:0 0 16px var(--orange-glow); transform:translateY(-2px); }
  .dungeon-head { padding:16px 18px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); position:relative; }
  .dungeon-head .ico { font-size:30px; }
  .dungeon-head .titles { flex:1; }
  .dungeon-head h3 { font-size:17px; font-weight:600; }
  .dungeon-head .meta { font-size:11px; color:var(--text-muted); font-family:monospace; margin-top:2px; }
  .dungeon-head .num { position:absolute; top:8px; right:12px; font-family:'Rajdhani'; font-weight:700; font-size:14px; color:var(--border); }
  .type-badge { display:inline-block; font-size:9px; text-transform:uppercase; letter-spacing:1px; padding:2px 7px; border-radius:4px; font-weight:600; }
  .type-badge.SOLO { background:rgba(78,168,255,0.15); color:var(--blue); }
  .type-badge.GROUPE { background:rgba(255,140,26,0.15); color:var(--orange); }
  .dungeon-body { padding:14px 18px; }
  .reqs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .req { display:flex; align-items:center; gap:5px; font-size:12px; background:var(--bg-3); border:1px solid var(--border); border-radius:6px; padding:4px 9px; }
  .req .rl { color:var(--text-muted); } .req .rv { font-family:'Rajdhani'; font-weight:600; }
  .req.hp .rv { color:var(--green); } .req.prestige .rv { color:var(--gold); } .req.lvl .rv { color:var(--blue); }
  .drops-title { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px; }
  .drops { display:flex; flex-direction:column; gap:5px; }
  .drop { font-size:12.5px; padding:6px 10px; background:var(--bg-3); border-radius:6px; border-left:2px solid var(--orange-dark); line-height:1.4; }
  .stats-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
  .stat-card { background:var(--bg-2); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }
  .stat-card .v { font-family:'Rajdhani'; font-weight:700; font-size:28px; color:var(--orange); }
  .stat-card .l { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--orange-dark); border-radius:3px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-circle"><span>V</span></div>
    <div><h1>Chambres & Donjons</h1><div class="sub">AirFlyff // Wiki Vanguard</div></div>
  </div>
  <div class="stats-bar">
    <div class="stat-card"><div class="v">23</div><div class="l">Donjons</div></div>
    <div class="stat-card"><div class="v">P10</div><div class="l">Prestige max</div></div>
    <div class="stat-card"><div class="v">4.1M</div><div class="l">PV max requis</div></div>
    <div class="stat-card"><div class="v">200</div><div class="l">Niveau max</div></div>
  </div>
  <input type="text" class="search-bar" id="search" placeholder="Rechercher un donjon ou un drop (ex: Yggdrasil, artefact, familier...)" oninput="render()">
  <div class="filters">
    <div class="filter active" onclick="setFilter('all',this)">Tous</div>
    <div class="filter" onclick="setFilter('debutant',this)">Debutant</div>
    <div class="filter" onclick="setFilter('intermediaire',this)">Intermediaire</div>
    <div class="filter" onclick="setFilter('avance',this)">Avance</div>
    <div class="filter" onclick="setFilter('endgame',this)">End-game</div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<script>
const DUNGEONS = [{"id": 1, "name": "Faille du débutant", "type": "SOLO", "lvl": "80-200", "prestige": null, "hp": 3000, "armor": null, "elem": "Terre", "cat": "debutant", "icon": "🌱", "drops": ["Penya", "Orichalque", "Pierre Lunaire", "Boîte consommables Oasis", "Jeton d'Air"]}, {"id": 2, "name": "Désiréa", "type": "SOLO", "lvl": "90-200", "prestige": null, "hp": 13000, "armor": null, "elem": "Terre", "cat": "debutant", "icon": "⚔️", "drops": ["Armes Luzaka oubliée (DPS) — toutes classes", "Boucliers Luzaka (DCC/INT/END)", "Armes Luzaka oubliée (TANK)", "Sceptre Luzaka (Support)"]}, {"id": 3, "name": "Forêt d'Euphrasia", "type": "SOLO", "lvl": "120-200", "prestige": null, "hp": 25000, "armor": null, "elem": "Terre", "cat": "debutant", "icon": "🌲", "drops": ["Bague/Collier/Boucle débutant", "Perles niv 3 (Ivillis, Shade, Bubble, chevalier, guerrier)", "Armes Euphrasiennes", "Masque Entaness (G/F)"]}, {"id": 4, "name": "Grotte d'Herneos", "type": "SOLO", "lvl": "130-200", "prestige": null, "hp": 65000, "armor": "Armure vent +20", "elem": "Terre", "cat": "intermediaire", "icon": "🕳️", "drops": ["Runes Luzaka oubliée (TANK)", "Perles niv 3"]}, {"id": 5, "name": "Ruines givrées", "type": "SOLO", "lvl": "130-200", "prestige": null, "hp": 65000, "armor": "Armure vent +20", "elem": "Terre", "cat": "intermediaire", "icon": "❄️", "drops": ["Meubles Modernes (7j) : Lit, Bibliothèque, Maquilleuse, Canapé, Table, Penderie"]}, {"id": 6, "name": "USS Celestia", "type": "SOLO", "lvl": "180-200", "prestige": 1, "hp": 145000, "armor": "Armure vent +20", "elem": "Terre", "cat": "avance", "icon": "🚀", "drops": ["Familiers INT/FOR/DEX/END (PVE/PVP)", "Morceau d'oeuf doré Britannia", "Capes de fusion vierges"]}, {"id": 7, "name": "Ruine Prestigieuse", "type": "SOLO", "lvl": "180-200", "prestige": 3, "prestigeNote": "3 (ét.1) - 6 (ét.2)", "hp": 120000, "armor": "Armure vent +20", "elem": "Terre", "cat": "avance", "icon": "🏛️", "drops": ["Liane Ruine Prestigieuse (trash)", "Terreau Ruine Prestigieuse (boss)"]}, {"id": 8, "name": "Temple aérien", "type": "SOLO", "lvl": "200", "prestige": 8, "hp": 350000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "⛩️", "drops": ["Plan de Fabrication d'Artefact", "Pierre d'amélioration Artefact", "Parchemins d'éveil bijou R1 & R2", "Pierre amélioration parure Tank/DPS", "Perles oubliées (7j)"]}, {"id": 9, "name": "Clairière de la fée", "type": "SOLO", "lvl": "200", "prestige": 10, "hp": 350000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "🧚", "drops": ["Poudre féerique", "Cristal féerique", "Essence de Luciole", "Coeur d'Ange"]}, {"id": 10, "name": "Fosse aux esprits", "type": "GROUPE", "lvl": "120-200", "prestige": null, "hp": 115000, "armor": null, "elem": "Terre", "cat": "intermediaire", "icon": "👻", "drops": ["Calebasse d'Azranoct", "Armes Vampirique (toutes)"]}, {"id": 11, "name": "Catacombes", "type": "GROUPE", "lvl": "130-200", "prestige": null, "hp": 215000, "armor": "Armure vent +20", "elem": "Terre", "cat": "avance", "icon": "💀", "drops": ["Set d'armure Shaitan complet (G/F)"]}, {"id": 12, "name": "Château de Draken", "type": "GROUPE", "lvl": "130-200", "prestige": null, "hp": 275000, "armor": "Armure vent +20", "elem": "Terre", "cat": "avance", "icon": "🏰", "drops": ["Set d'armure Dryades complet (G/F)"]}, {"id": 13, "name": "Crypte des sans repos", "type": "GROUPE", "lvl": "130-200", "prestige": null, "hp": 315000, "armor": "Armure vent +20", "elem": "Terre", "cat": "avance", "icon": "⚰️", "drops": ["Rune Vampirique Vierge"]}, {"id": 14, "name": "Behemoth", "type": "GROUPE", "lvl": "130-200", "prestige": null, "hp": 430000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "🦣", "drops": ["Parchemins d'éveil fixe R1 & R2 (INCANT, DEPLA, SOINS, HP, MP, ATTAQUE, FOR, END, DEX, INT, DCC)", "Coffret de parchemin d'éveil"]}, {"id": 15, "name": "Bastion de l'Archange", "type": "GROUPE", "lvl": "130-200", "prestige": null, "hp": 385000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "😇", "drops": ["Anneau Ailé Pur", "Boucles Harpe Pur", "Collier d'Ange Pur", "+ versions normales"]}, {"id": 16, "name": "Sentier de Rhisis", "type": "GROUPE", "lvl": "180-200", "prestige": 3, "hp": 1300000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "🛤️", "drops": ["Armures Yggdrasil par classe (toutes pièces)", "Capes de fusion vierges"]}, {"id": 17, "name": "Dédale de Rhisis", "type": "GROUPE", "lvl": "180-200", "prestige": 3, "hp": 1300000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "🌀", "drops": ["Armes Yggdrasil Purifié (toutes)", "Boucliers & Grimoires Yggdrasil", "Capes de fusion vierges"]}, {"id": 18, "name": "Sietch Kalgas", "type": "GROUPE", "lvl": "180-200", "prestige": 5, "hp": 0, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "🐉", "drops": ["(données à compléter)"]}, {"id": 19, "name": "Jardin de Jade", "type": "GROUPE", "lvl": "180-200", "prestige": 7, "hp": 1500000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "🟢", "drops": ["Marteau Runique Yggdrasil", "Rune Yggdrasil Vierge"]}, {"id": 20, "name": "Paradis Arcanique", "type": "GROUPE", "lvl": "200", "prestige": 8, "hp": 3700000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "🌌", "drops": ["Plan de Fabrication d'Artefact", "Parchemins d'éveil Fashion R1 & R2", "Étui à carte 1/2/3", "Coffrets cartes Epic/Rare"]}, {"id": 21, "name": "Mausolée des Divinités", "type": "GROUPE", "lvl": "200", "prestige": 9, "hp": 3700000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "🗿", "drops": ["Armes éternelles (toutes)", "Bouclier éternel", "Coffrets cartes Epic/Rare"]}, {"id": 22, "name": "Sanctuaire Shogun", "type": "GROUPE", "lvl": "200", "prestige": 10, "hp": 3700000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "🏯", "drops": ["Fragments d'essence d'armure par classe", "Coffrets cartes Epic/Rare"]}, {"id": 23, "name": "Jardin des Rois", "type": "GROUPE", "lvl": "200", "prestige": 10, "hp": 4100000, "armor": "Armure vent +20", "elem": "Terre", "cat": "endgame", "icon": "👑", "drops": ["Runes Éternelles (TANK) — toutes armes", "Pierre amélioration parure DPS/Tank", "Ailes enchantées", "Coffrets cartes Epic/Rare"]}];
let curFilter="all";
function fmtHp(n){ if(!n)return "?"; if(n>=1000000)return (n/1000000).toFixed(1).replace('.0','')+"M"; if(n>=1000)return Math.round(n/1000)+"k"; return n; }
function setFilter(cat,el){ curFilter=cat; document.querySelectorAll('.filter').forEach(f=>f.classList.remove('active')); el.classList.add('active'); render(); }
function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const filtered=DUNGEONS.filter(d=>{
    if(curFilter!=="all" && d.cat!==curFilter) return false;
    if(!q) return true;
    if(d.name.toLowerCase().includes(q)) return true;
    return d.drops.some(dr=>dr.toLowerCase().includes(q));
  });
  document.getElementById("grid").innerHTML=filtered.map(d=>
    '<div class="dungeon"><div class="dungeon-head"><span class="ico">'+d.icon+'</span>'+
    '<div class="titles"><h3>'+d.name+'</h3><div class="meta"><span class="type-badge '+d.type+'">'+d.type+'</span> · Élément '+d.elem+'</div></div>'+
    '<span class="num">#'+d.id+'</span></div>'+
    '<div class="dungeon-body"><div class="reqs">'+
    '<div class="req lvl"><span class="rl">Niv</span><span class="rv">'+d.lvl+'</span></div>'+
    (d.prestige?'<div class="req prestige"><span class="rl">🌟</span><span class="rv">P'+d.prestige+(d.prestigeNote?' ('+d.prestigeNote+')':'')+'</span></div>':'')+
    '<div class="req hp"><span class="rl">❤️</span><span class="rv">'+fmtHp(d.hp)+' PV</span></div>'+
    (d.armor?'<div class="req"><span class="rl">🛡️</span><span class="rv">'+d.armor+'</span></div>':'')+
    '</div><div class="drops-title">Drops</div><div class="drops">'+
    d.drops.map(dr=>'<div class="drop">'+dr+'</div>').join("")+
    '</div></div></div>'
  ).join("") || '<div style="color:var(--text-muted);padding:40px;text-align:center;grid-column:1/-1">Aucun donjon trouvé</div>';
}
render();
</script>
</body>
</html>
